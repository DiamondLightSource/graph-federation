name: Generate Supergraph Schema

on:
  workflow_call:

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Cosmo CLI
        run: npm install -g wgc@latest

      - name: Checkout Source
        uses: actions/checkout@v4.2.2

      - name: Compose Execution Config
        run: |
          wgc router compose \
            --input supergraph-config.yaml \
            --out router-execution-config.json

      - name: Upload Execution Config Artifact
        uses: actions/upload-artifact@v7
        with:
          name: router-execution-config.json
          path: router-execution-config.json

      - name: Install Supergraph Schema Composition dependencies
        run: npm install @wundergraph/composition graphql js-yaml

      - name: Generate Supergraph Schema
        run: |
          node .ci/generate-supergraph.mjs
          test -s supergraph.graphql

      - name: Upload Supergraph Schema Artifact
        uses: actions/upload-artifact@v7
        with:
          name: supergraph-schema
          path: supergraph.graphql
          overwrite: true

      - name: Release Router Execution Config and Schema
        if: github.event_name == 'push' && ( startsWith(github.ref, 'refs/tags/supergraph-schema@') )
        uses: softprops/action-gh-release@v1
        with:
          files: |
            router-execution-config.json
            supergraph.graphql
