name: Generate Supergraph Schema

on:
  workflow_call:

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Cosmo CLI
        run: npm install -g wgc@latest

      - name: Checkout Source
        uses: actions/checkout@v4.2.2

      - name: Compose Execution Config
        run: |
          mkdir -p charts/graph/files
          wgc router compose \
            --input supergraph-config.yaml \
            --out charts/graph/files/router-execution-config.json

      - name: Upload Execution Config Artifact
        uses: actions/upload-artifact@v4
        with:
          name: router-execution-config.json
          path: charts/graph/files/router-execution-config.json

      - name: Release Router Execution Config
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/router-execution-config@')
        uses: softprops/action-gh-release@v1
        with:
          files: charts/graph/files/router-execution-config.json
