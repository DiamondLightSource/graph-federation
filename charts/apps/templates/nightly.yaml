apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: graph-nightly
  namespace: {{ .Release.Namespace }}
spec:
  project: {{ .Release.Namespace }}
  source:
    repoURL: https://github.com/DiamondLightSource/graph-federation
    targetRevision: HEAD
    path: charts/graph
    helm:
      valuesObject:
        router:
          configuration:
            telemetry:
              exporters:
                metrics:
                  common:
                    resource:
                      "service.name": "router-nightly"
                  otlp:
                    enabled: true
                    endpoint: 'graph-monitoring-opentelemetry-collector:4317'
                    protocol: grpc
                tracing:
                  common:
                    resource:
                      "service.name": "router-nightly"
                  otlp:
                    enabled: true
                    endpoint: 'graph-monitoring-opentelemetry-collector:4317'
                    protocol: grpc
                  propagation:
                    trace_context: true
  destination:
    server: https://api.argus.diamond.ac.uk:6443
    namespace: {{ .Release.Namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
