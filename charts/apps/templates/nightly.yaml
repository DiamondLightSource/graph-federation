apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: graph-nightly
  namespace: {{.Release.Namespace}}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{default .Release.Namespace .Values.project}}
  sources:
    - repoURL: {{.Values.graph.repoURL}}
      targetRevision: {{.Values.graph.nightlyRevision}}
      path: {{.Values.graph.path}}
      helm:
        valuesObject:
          router:
            router:
              configuration:
                logLevel: "info"
                # routerConfigPath: /etc/cosmo/execution-config.json

                prometheus:
                  enabled: true
                  port: 8088
                  path: /metrics

            commonConfiguration: |-
              version: "1"
              log_level: "info"

              listen_addr: "0.0.0.0:3002"
              health_check_path: "/health"
              readiness_check_path: "/health/ready"
              liveness_check_path: "/health/live"

              playground_enabled: true
              playground_path: "/"
              introspection:
                enabled: true

              cors:
                allow_origins:
                  - "*"

              headers:
                all:
                  request:
                    - op: "propagate"
                      named: Authorization
                    - op: "propagate"
                      named: Cookie

              subgraph_error_propagation:
                mode: wrapped
                allowed_extension_fields:
                  - "code"
                propagate_status_codes: true
                attach_service_name: true
                omit_locations: true
                omit_extensions: false
                default_extension_code: DOWNSTREAM_SERVICE_ERROR

              telemetry:
                service_name: "router-nightly"
                tracing:
                  enabled: true
                  exporters:
                    - endpoint: "http://graph-monitoring-opentelemetry-collector:4317"
                      exporter: "grpc"
                metrics:
                  otlp:
                    enabled: true
                    exporters:
                      - endpoint: "http://graph-monitoring-opentelemetry-collector:4317"
                        exporter: "grpc"

          "oauth2-proxy":
            ingress:
              enabled: true
              hostname: graph-nightly.diamond.ac.uk
              hosts:
                - graph-nightly.diamond.ac.uk
              annotations:
                nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
                nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
                nginx.ingress.kubernetes.io/websocket-services: "graph-nightly-oauth2-proxy"
            alphaConfig:
              enabled: true
              configData:
                proxyWebSockets: true
                providers:
                  - provider: oidc
                    scope: "openid profile email fedid"
                    clientId: graph-nightly
                    clientSecretFile: /etc/alpha/client-secret
                    id: authn
                    oidcConfig:
                      issuerURL: https://authn.diamond.ac.uk/realms/master
                      insecureAllowUnverifiedEmail: true
                      audienceClaims:
                        - aud
                      emailClaim: email
                      userIDClaim: email

    - repoURL: {{.Values.schema.repoURL}}
      chart: {{.Values.schema.chart}}
      targetRevision: {{.Values.schema.nightlyRevision | quote}}

  destination:
    name: {{.Values.destination.name}}
    server: {{.Values.destination.server}}
    namespace: {{default .Release.Namespace .Values.destination.namespace}}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
